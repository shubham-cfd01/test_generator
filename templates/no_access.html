<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Arth Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
        body { background:#F8FAFC; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .card {
            background:white; border-radius:20px; padding:48px 40px; max-width:420px;
            text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.08);
        }
        .card .icon { font-size:48px; color:#EF4444; margin-bottom:16px; }
        .card h2 { font-size:22px; margin-bottom:12px; color:#0F172A; }
        .card p { color:#64748B; font-size:15px; margin-bottom:24px; line-height:1.6; }
        .card a {
            display:inline-block; padding:12px 28px; background:#4F46E5; color:white;
            text-decoration:none; border-radius:10px; font-weight:600; font-size:15px;
        }
        .card a:hover { background:#4338CA; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fa-solid fa-lock"></i></div>
        <h2>Access Denied</h2>
        <p>You don't have access to <strong>{{ product }}</strong>. Contact admin to upgrade your plan.</p>
        <a href="{{ url_for('dashboard') }}"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</body>
</html>
